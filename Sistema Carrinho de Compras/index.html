<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="js.js" defer></script>
    <title>Livraria Panacea</title>
</head>

<body>
    <header>
        <h1>Livraria Panacea</h1>
        <h3>Tudo pela Leitura</h3>
    </header>
    <main class="container mt-3">
        <div class="row">

            <!-- ÁREA DE COMPRA -->
            <div class="col-lg-8 col-12">
                <div class="areaCompra">
                    <div class="areaFiltro">
                        <select id="filtro" class="form-select">
                            <option value="todos" selected>Todos os livros</option>
                            <option value="ate50">Livros até 50 reais</option>
                            <option value="acima50">Livro acima de 50 reais</option>
                        </select>
                    </div>

                    <div class="areaSelecionarProdutos row g-3"></div>
                </div>
            </div>

            <!-- CARRINHO -->
            <div class="col-lg-4 col-12">
                <div class="areaCarrinho">
                    <div class="carrinho">
                        <p class="tituloLivro">Nenhum item adicionado ao carrinho ainda</p>
                    </div>

                    <div class="areaPagamento">
                        <h4>TOTAL</h4>
                        <p id="qntItensCarrinho">Total de itens no carrinho:</p>
                        <p id="totalCompra">0,00</p>
                        <button class="btnPagar">PAGAR</button>
                    </div>
                </div>
            </div>

        </div>
    </main>
</body>

</html>
